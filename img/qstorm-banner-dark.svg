<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120" viewBox="0 0 600 120">
  <!-- storm cloud -->
  <circle cx="42" cy="28" r="17" fill="#3b82f6"/>
  <circle cx="62" cy="26" r="14" fill="#3b82f6"/>
  <circle cx="30" cy="32" r="12" fill="#3b82f6"/>
  <circle cx="72" cy="32" r="10" fill="#3b82f6"/>
  <rect x="20" y="30" width="54" height="14" rx="2" fill="#3b82f6"/>

  <!-- lightning bolt -->
  <path d="M50 42 L44 58 L54 58 L46 74" fill="none" stroke="#fbbf24" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- queue blocks -->
  <rect x="14" y="82" width="20" height="14" rx="3" fill="#3b82f6" opacity="0.4"/>
  <rect x="38" y="82" width="20" height="14" rx="3" fill="#3b82f6" opacity="0.65"/>
  <rect x="62" y="82" width="20" height="14" rx="3" fill="#3b82f6" opacity="0.9"/>

