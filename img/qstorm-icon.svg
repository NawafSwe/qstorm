<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- storm cloud -->
  <circle cx="52" cy="32" r="20" fill="#1a56db"/>
  <circle cx="76" cy="30" r="16" fill="#1a56db"/>
  <circle cx="38" cy="36" r="14" fill="#1a56db"/>
  <circle cx="86" cy="36" r="12" fill="#1a56db"/>
  <rect x="26" y="34" width="62" height="16" rx="2" fill="#1a56db"/>

  <!-- lightning bolt from cloud -->
  <path d="M62 48 L54 68 L66 68 L56 88" fill="none" stroke="#fbbf24" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- queue: three message blocks in a row -->
  <rect x="16" y="98" width="24" height="18" rx="3" fill="#1a56db" opacity="0.4"/>
  <rect x="44" y="98" width="24" height="18" rx="3" fill="#1a56db" opacity="0.65"/>
  <rect x="72" y="98" width="24" height="18" rx="3" fill="#1a56db" opacity="0.9"/>

  <!-- small arrows between queue blocks -->
  <path d="M42 107 L44 107" stroke="#1a56db" stroke-width="2" stroke-linecap="round"/>
  <path d="M70 107 L72 107" stroke="#1a56db" stroke-width="2" stroke-linecap="round"/>

  <!-- arrow out of queue -->
  <path d="M100 107 L110 107 M106 103 L110 107 L106 111" fill="none" stroke="#1a56db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
