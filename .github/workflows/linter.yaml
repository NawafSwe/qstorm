name: "Linter"

on:
  pull_request:
    branches: [master, main]
    paths-ignore:
      - "*.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: golangci-lint
        run: make lint
