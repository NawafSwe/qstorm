name: "Test"

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: make test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage.out

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: go.sum

      - name: Start services
        run: make docker-start

      - name: Wait for PubSub emulator and create topic
        run: |
          for i in $(seq 1 30); do
            curl -s -X PUT http://localhost:8095/v1/projects/qstorm-project/topics/qstorm-topic > /dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:8095/v1/projects/qstorm-project/topics/qstorm-topic || exit 1

      - name: Wait for Kafka brokers
        run: |
          for i in $(seq 1 30); do
            docker compose logs kafka 2>&1 | grep -q "Kafka Server started" && break
            sleep 1
          done
          docker compose logs kafka 2>&1 | grep -q "Kafka Server started" || exit 1
          for i in $(seq 1 30); do
            docker compose logs kafka-sasl 2>&1 | grep -q "Kafka Server started" && break
            sleep 1
          done
          docker compose logs kafka-sasl 2>&1 | grep -q "Kafka Server started" || exit 1

      - name: Run integration tests
        run: make test-integration

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.out

  coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Merge coverage files
        run: |
          head -1 coverage.out > coverage-combined.out
          tail -n +2 coverage.out >> coverage-combined.out
          tail -n +2 coverage-integration.out >> coverage-combined.out

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage-combined.out
